<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Join a Workspace — Moshly</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="nav-logo-img" />
        <span class="nav-logo-text">Moshly</span>
      </a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-modal">

      <div class="auth-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="auth-logo-img" />
      </div>

      <h2 class="auth-panel-title" style="margin-bottom:6px;">Join a Workspace</h2>
      <p class="auth-panel-desc" style="margin-bottom:24px;">Enter the invite code shared by your workspace owner.</p>

      <div class="auth-field" style="margin-bottom:16px;">
        <label class="auth-label" for="invite-code-input">Invite Code</label>
        <input class="auth-input" type="text" id="invite-code-input" placeholder="MOSH-XXXX"
          autocomplete="off" style="text-transform:uppercase;letter-spacing:.12em;font-size:18px;text-align:center;"
          oninput="this.value=this.value.toUpperCase()" />
      </div>

      <div id="join-feedback" class="auth-feedback auth-feedback--error" style="display:none;"></div>

      <button type="button" class="btn-primary auth-submit" id="joinBtn" onclick="handleJoin()" style="margin-top:4px;">Continue</button>

      <p class="auth-switch" style="margin-top:20px;">Already have an account? <a href="/login.html">Log In</a></p>
      <p class="auth-switch" style="margin-top:8px;">New to Moshly? <a href="/signup.html">Create an account</a></p>

    </div>
  </section>

  <script src="auth-client.js"></script>
  <script>
    // Pre-fill invite code from URL param
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || params.get('invite') || params.get('c');
      if (code) document.getElementById('invite-code-input').value = code.toUpperCase();
    });

    async function handleJoin() {
      const code     = document.getElementById('invite-code-input').value.trim();
      const feedback = document.getElementById('join-feedback');
      const btn      = document.getElementById('joinBtn');

      feedback.style.display = 'none';

      if (!code) {
        feedback.textContent = 'Please enter your invite code.';
        feedback.style.display = 'block';
        return;
      }

      // If logged in, apply the code directly; otherwise send to signup with code pre-filled
      const user = await MoshlyAuth.getSession();
      if (user) {
        btn.disabled = true;
        btn.textContent = 'Checking…';

        const { ok, data } = await MoshlyAuth.authFetch('/waitlist', {
          method: 'POST',
          body: JSON.stringify({ code })
        });

        if (ok && data.success) {
          window.location.href = '/dashboard.html';
        } else {
          feedback.textContent = data.error || 'Invalid or expired invite code.';
          feedback.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Continue';
        }
      } else {
        // Send to signup with the code pre-filled
        window.location.href = '/signup.html?code=' + encodeURIComponent(code);
      }
    }

    // Allow Enter key to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('invite-code-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleJoin();
      });
    });
  </script>
</body>
</html>
