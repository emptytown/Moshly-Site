<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sign Up — Moshly</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="nav-logo-img" />
        <span class="nav-logo-text">Moshly</span>
      </a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-modal">

      <div class="auth-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="auth-logo-img" />
      </div>

      <h2 class="auth-panel-title" style="margin-bottom:6px;">Create your account</h2>
      <p class="auth-panel-desc" style="margin-bottom:24px;">Join Moshly and get started today.</p>

      <form class="auth-form" id="signupForm" autocomplete="on" onsubmit="handleSignup(event)">

        <div class="auth-form-row">
          <div class="auth-field">
            <label class="auth-label" for="reg-fname">First Name</label>
            <input class="auth-input" type="text" id="reg-fname" placeholder="First" required autocomplete="given-name" />
          </div>
          <div class="auth-field">
            <label class="auth-label" for="reg-lname">Last Name</label>
            <input class="auth-input" type="text" id="reg-lname" placeholder="Last" required autocomplete="family-name" />
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="reg-email">Email</label>
          <input class="auth-input" type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email" />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="reg-password">Password</label>
          <div class="auth-pw-wrap">
            <input class="auth-input" type="password" id="reg-password"
              placeholder="Min. 12 characters" required minlength="12"
              autocomplete="new-password" oninput="updateMeter('reg-password','pwMeter')" />
            <button type="button" class="auth-pw-toggle" aria-label="Show password" onclick="togglePw(this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <!-- Password strength meter -->
          <div id="pwMeter" style="display:none;margin-top:8px;">
            <div style="display:flex;gap:4px;margin-bottom:6px;">
              <div id="pwMeter-s0" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
              <div id="pwMeter-s1" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
              <div id="pwMeter-s2" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
              <div id="pwMeter-s3" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div style="display:flex;flex-direction:column;gap:3px;">
                <span id="pwMeter-hLen"  style="font-size:11px;color:#9ca3af;">○ At least 12 characters</span>
                <span id="pwMeter-hSym"  style="font-size:11px;color:#9ca3af;">○ At least one number or symbol</span>
              </div>
              <span id="pwMeter-lbl" style="font-size:11px;font-weight:600;color:#9ca3af;"></span>
            </div>
          </div>
        </div>

        <div class="auth-field" id="inviteCodeField">
          <label class="auth-label" for="reg-invite-code">Invite Code <span style="color:var(--color-text-tertiary);font-weight:400;">(optional)</span></label>
          <input class="auth-input" type="text" id="reg-invite-code" placeholder="MOSH-XXXX" autocomplete="off"
            style="text-transform:uppercase;letter-spacing:.1em;"
            oninput="this.value=this.value.toUpperCase()" />
        </div>

        <div id="reg-feedback" class="auth-feedback auth-feedback--error" style="display:none;"></div>

        <div class="auth-field" style="margin-top:4px;">
          <label class="auth-consent-label">
            <input type="checkbox" id="reg-terms" class="auth-consent-check" required />
            I agree to the <a href="/terms.html" target="_blank">Terms of Service</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a>
          </label>
        </div>

        <div class="auth-field">
          <label class="auth-consent-label">
            <input type="checkbox" id="reg-marketing" class="auth-consent-check" />
            I'm happy to receive product updates and news from Moshly
          </label>
        </div>

        <button type="submit" class="btn-primary auth-submit" id="signupBtn">Create Account</button>
      </form>

      <p class="auth-switch" style="margin-top:20px;">Already have an account? <a href="/login.html">Log In</a></p>

    </div>
  </section>

  <script src="auth-client.js"></script>
  <script>
    // Redirect already-authenticated users
    (async () => {
      // Use getSession() instead of isAuthenticated() to allow silentRefresh to run
      const user = await MoshlyAuth.getSession();
      if (user) {
        window.location.href = '/dashboard.html';
      }
    })();

    // Pre-fill invite code from URL param
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || params.get('invite');
      if (code) document.getElementById('reg-invite-code').value = code.toUpperCase();
    });

    // ── Password strength meter ───────────────────────────────────────────────

    const METER_COLORS = ['#ef4444', '#f97316', '#6b5cff', '#22c55e'];
    const METER_LABELS = ['Weak', 'Fair', 'Good', 'Strong'];

    function scorePassword(pw) {
      const hasMinLength  = pw.length >= 12;
      const hasNonLetter  = /[^a-zA-Z]/.test(pw);
      if (!hasMinLength || !hasNonLetter) return 0;   // fails requirements → Weak
      const hasLongLength = pw.length >= 16;
      const hasMixedCase  = /[A-Z]/.test(pw) && /[a-z]/.test(pw);
      const hasSymbol     = /[^a-zA-Z0-9]/.test(pw);
      const hasNumber     = /[0-9]/.test(pw);
      const bonuses = [hasLongLength, hasMixedCase, hasSymbol, hasNumber].filter(Boolean).length;
      if (bonuses >= 3) return 3;   // Strong
      if (bonuses >= 1) return 2;   // Good
      return 1;                      // Fair
    }

    function updateMeter(inputId, meterId) {
      const pw      = document.getElementById(inputId).value;
      const wrap    = document.getElementById(meterId);
      const hLen    = document.getElementById(meterId + '-hLen');
      const hSym    = document.getElementById(meterId + '-hSym');
      const lbl     = document.getElementById(meterId + '-lbl');

      if (!pw.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';

      const score       = scorePassword(pw);
      const activeColor = METER_COLORS[score];
      const filledSegs  = score + 1;

      for (let i = 0; i < 4; i++) {
        document.getElementById(meterId + '-s' + i).style.background =
          i < filledSegs ? activeColor : '#e5e7eb';
      }

      lbl.textContent  = METER_LABELS[score];
      lbl.style.color  = activeColor;

      const okLen = pw.length >= 12;
      const okSym = /[^a-zA-Z]/.test(pw);
      hLen.textContent = (okLen ? '✓' : '○') + ' At least 12 characters';
      hLen.style.color = okLen ? '#22c55e' : '#9ca3af';
      hSym.textContent = (okSym ? '✓' : '○') + ' At least one number or symbol';
      hSym.style.color = okSym ? '#22c55e' : '#9ca3af';
    }

    // ── Form submission ───────────────────────────────────────────────────────

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
    }

    async function handleSignup(event) {
      event.preventDefault();

      const firstName  = document.getElementById('reg-fname').value.trim();
      const lastName   = document.getElementById('reg-lname').value.trim();
      const name       = `${firstName} ${lastName}`.trim();
      const email      = document.getElementById('reg-email').value.trim();
      const password   = document.getElementById('reg-password').value;
      const inviteCode = document.getElementById('reg-invite-code').value.trim() || null;
      const feedback   = document.getElementById('reg-feedback');
      const btn        = document.getElementById('signupBtn');

      if (!isValidEmail(email)) {
        feedback.textContent = 'Please enter a valid email address.';
        feedback.style.display = 'block';
        return;
      }

      feedback.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating Account…';

      const payload = { email, password, name };
      if (inviteCode) payload.inviteCode = inviteCode;

      const { ok, data } = await MoshlyAuth.authFetch('/register', {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      if (ok && data.success) {
        // Auto-login with the same credentials
        const loginResult = await MoshlyAuth.authFetch('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        if (loginResult.ok && loginResult.data.success) {
          MoshlyAuth.setSession(loginResult.data.user, loginResult.data.token);
          window.location.href = '/setup-profile.html';
        } else {
          // Registration worked but auto-login failed — send to login page
          window.location.href = '/login.html?registered=true&email=' + encodeURIComponent(email);
        }
      } else {
        feedback.textContent = data.error || 'Registration failed. Please try again.';
        feedback.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    function togglePw(btn) {
      const input = btn.previousElementSibling;
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
