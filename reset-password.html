<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Moshly</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="nav-logo-img" />
        <span class="nav-logo-text">Moshly</span>
      </a>
    </div>
  </nav>

  <!-- RESET FORM -->
  <section class="auth-section">
    <div class="auth-modal">
      <div class="auth-panel auth-panel--active" id="panelReset">
        <div class="auth-forgot-header">
          <h3 class="auth-panel-title">Reset your password</h3>
          <p class="auth-panel-desc">Enter your new password below.</p>
        </div>
        <form class="auth-form" onsubmit="handleReset(event)">
          <div class="auth-field">
            <label class="auth-label" for="new-password">New Password</label>
            <input class="auth-input" type="password" id="new-password"
              placeholder="Min. 12 characters" required minlength="12"
              autocomplete="new-password" oninput="updateMeter('new-password','pwMeter')" />
            <!-- Password strength meter -->
            <div id="pwMeter" style="display:none;margin-top:8px;">
              <div style="display:flex;gap:4px;margin-bottom:6px;">
                <div id="pwMeter-s0" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
                <div id="pwMeter-s1" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
                <div id="pwMeter-s2" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
                <div id="pwMeter-s3" style="flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .2s;"></div>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div style="display:flex;flex-direction:column;gap:3px;">
                  <span id="pwMeter-hLen" style="font-size:11px;color:#9ca3af;">○ At least 12 characters</span>
                  <span id="pwMeter-hSym" style="font-size:11px;color:#9ca3af;">○ At least one number or symbol</span>
                </div>
                <span id="pwMeter-lbl" style="font-size:11px;font-weight:600;color:#9ca3af;"></span>
              </div>
            </div>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="confirm-password">Confirm Password</label>
            <input class="auth-input" type="password" id="confirm-password" placeholder="Repeat password" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn-primary auth-submit">Reset Password</button>
        </form>
        <div class="auth-success" id="resetSuccess" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#4ADE80" stroke-width="1.5"/><path d="M6 10l3 3 5-5" stroke="#4ADE80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Password reset successful! <a href="/login.html">Log in here</a>.
        </div>
        <div class="auth-error" id="resetError" style="display:none;"></div>
      </div>
    </div>
  </section>

  <script src="auth-client.js"></script>
  <script>
    // Read token immediately on page load and clear it from the URL
    const RESET_TOKEN = new URLSearchParams(window.location.search).get('token');
    if (window.history && window.history.replaceState) {
      history.replaceState(null, '', window.location.pathname);
    }

    // Show error and disable form immediately if no token in URL
    document.addEventListener('DOMContentLoaded', function () {
      if (!RESET_TOKEN) {
        document.querySelector('.auth-form').style.display = 'none';
        showError('Invalid or expired reset link. Please request a new one.');
      }
    });

    // ── Password strength meter ───────────────────────────────────────────────

    const METER_COLORS = ['#ef4444', '#f97316', '#6b5cff', '#22c55e'];
    const METER_LABELS = ['Weak', 'Fair', 'Good', 'Strong'];

    function scorePassword(pw) {
      const hasMinLength  = pw.length >= 12;
      const hasNonLetter  = /[^a-zA-Z]/.test(pw);
      if (!hasMinLength || !hasNonLetter) return 0;
      const hasLongLength = pw.length >= 16;
      const hasMixedCase  = /[A-Z]/.test(pw) && /[a-z]/.test(pw);
      const hasSymbol     = /[^a-zA-Z0-9]/.test(pw);
      const hasNumber     = /[0-9]/.test(pw);
      const bonuses = [hasLongLength, hasMixedCase, hasSymbol, hasNumber].filter(Boolean).length;
      if (bonuses >= 3) return 3;
      if (bonuses >= 1) return 2;
      return 1;
    }

    function updateMeter(inputId, meterId) {
      const pw   = document.getElementById(inputId).value;
      const wrap = document.getElementById(meterId);
      const hLen = document.getElementById(meterId + '-hLen');
      const hSym = document.getElementById(meterId + '-hSym');
      const lbl  = document.getElementById(meterId + '-lbl');

      if (!pw.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';

      const score       = scorePassword(pw);
      const activeColor = METER_COLORS[score];
      const filledSegs  = score + 1;

      for (let i = 0; i < 4; i++) {
        document.getElementById(meterId + '-s' + i).style.background =
          i < filledSegs ? activeColor : '#e5e7eb';
      }

      lbl.textContent = METER_LABELS[score];
      lbl.style.color = activeColor;

      const okLen = pw.length >= 12;
      const okSym = /[^a-zA-Z]/.test(pw);
      hLen.textContent = (okLen ? '✓' : '○') + ' At least 12 characters';
      hLen.style.color = okLen ? '#22c55e' : '#9ca3af';
      hSym.textContent = (okSym ? '✓' : '○') + ' At least one number or symbol';
      hSym.style.color = okSym ? '#22c55e' : '#9ca3af';
    }

    // ── Form submission ───────────────────────────────────────────────────────

    async function handleReset(event) {
      event.preventDefault();

      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const token    = RESET_TOKEN;

      if (!token) {
        showError('Invalid or expired reset link. Please request a new one.');
        return;
      }

      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      if (password.length < 12) {
        showError('Password must be at least 12 characters');
        return;
      }

      if (!/[^a-zA-Z]/.test(password)) {
        showError('Password must contain at least one number or symbol');
        return;
      }

      const btn = event.target.querySelector('.auth-submit');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Please wait…';
      }

      try {
        const res = await MoshlyAuth.authFetch('/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password }),
        });

        if (res.ok) {
          document.querySelector('.auth-form').style.display = 'none';
          const successMsg = document.getElementById('resetSuccess');
          if (successMsg) successMsg.style.display = 'flex';
        } else {
          if (btn) {
            btn.disabled = false;
            btn.textContent = 'Reset Password';
          }
          showError(res.data?.error || 'Reset failed. Please try again.');
        }
      } catch (err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
        showError('Network error — check your connection and try again.');
      }
    }

    function showError(message) {
      const errorEl = document.getElementById('resetError');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
        setTimeout(() => { if (errorEl) errorEl.style.display = 'none'; }, 5000);
      }
    }
  </script>
</body>
</html>
