<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Moshly</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="auth-sync.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="nav-logo-img" />
        <span class="nav-logo-text">Moshly</span>
      </a>
    </div>
  </nav>

  <!-- RESET FORM -->
  <section class="auth-section">
    <div class="auth-modal">
      <div class="auth-panel auth-panel--active" id="panelReset">
        <div class="auth-forgot-header">
          <h3 class="auth-panel-title">Reset your password</h3>
          <p class="auth-panel-desc">Enter your new password below.</p>
        </div>
        <form class="auth-form" onsubmit="handleReset(event)">
          <div class="auth-field">
            <label class="auth-label" for="new-password">New Password</label>
            <input class="auth-input" type="password" id="new-password" placeholder="••••••••" required autocomplete="new-password" />
          </div>
          <div class="auth-field">
            <label class="auth-label" for="confirm-password">Confirm Password</label>
            <input class="auth-input" type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn-primary auth-submit">Reset Password</button>
        </form>
        <div class="auth-success" id="resetSuccess" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#4ADE80" stroke-width="1.5"/><path d="M6 10l3 3 5-5" stroke="#4ADE80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Password reset successful! <a href="/home?auth=login">Log in here</a>.
        </div>
        <div class="auth-error" id="resetError" style="display:none;"></div>
      </div>
    </div>
  </section>

  <script src="auth-client.js"></script>
  <script>
    // Read token immediately on page load and clear it from the URL
    const RESET_TOKEN = new URLSearchParams(window.location.search).get('token');
    if (window.history && window.history.replaceState) {
      history.replaceState(null, '', window.location.pathname);
    }

    // Show error and disable form immediately if no token in URL
    document.addEventListener('DOMContentLoaded', function () {
      if (!RESET_TOKEN) {
        document.querySelector('.auth-form').style.display = 'none';
        showError('Invalid or expired reset link. Please request a new one.');
      }
    });

    async function handleReset(event) {
      event.preventDefault();

      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const token = RESET_TOKEN;

      if (!token) {
        showError('Invalid or expired reset link. Please request a new one.');
        return;
      }

      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }

      const btn = event.target.querySelector('.auth-submit');
      btn.disabled = true;
      btn.textContent = 'Please wait…';
      try {
        const { ok, data } = await authFetch('/reset', {
          method: 'POST',
          body: JSON.stringify({ token, password }),
        });

        if (ok) {
          document.querySelector('.auth-form').style.display = 'none';
          document.getElementById('resetSuccess').style.display = 'flex';
        } else {
          btn.disabled = false;
          btn.textContent = 'Reset Password';
          showError(data.error || 'Reset failed. Please try again.');
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
        showError('Network error — check your connection and try again.');
      }
    }

    function showError(message) {
      const errorEl = document.getElementById('resetError');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => errorEl.style.display = 'none', 5000);
    }
  </script>
</body>
</html>
