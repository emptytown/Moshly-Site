name = "moshly-site"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "MOSHLY_DB"
database_name = "moshly-db"
database_id = "078bb103-ae9b-4975-9e21-66877f480333"

# KV namespace for auth state: rate-limit counters + refresh tokens.
# Create with: wrangler kv:namespace create AUTH_KV
# Then replace the id values below with the output IDs.
[[kv_namespaces]]
binding = "AUTH_KV"
id = "67a5f773bd124eafb0ae5af32aadb02e"
preview_id = "4c934828e2824b459e2aca262eed3a5f"
