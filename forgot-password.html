<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Forgot Password — Moshly</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="nav-logo-img" />
        <span class="nav-logo-text">Moshly</span>
      </a>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-modal">

      <div class="auth-logo">
        <img src="assets/Moshly-Main-Logo-1.svg" alt="Moshly" class="auth-logo-img" />
      </div>

      <a href="/login.html" class="auth-back" style="margin-bottom:16px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to Log In
      </a>

      <h2 class="auth-panel-title" style="margin-bottom:6px;">Reset your password</h2>
      <p class="auth-panel-desc" style="margin-bottom:24px;">Enter your email and we'll send you a reset link.</p>

      <form class="auth-form" id="forgotForm" onsubmit="handleForgot(event)">
        <div class="auth-field">
          <label class="auth-label" for="forgot-email">Email</label>
          <input class="auth-input" type="email" id="forgot-email" placeholder="your@email.com" required autocomplete="email" />
        </div>

        <div id="forgot-feedback" class="auth-feedback auth-feedback--error" style="display:none;"></div>

        <div id="forgot-success" class="auth-success" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#4ADE80" stroke-width="1.5"/><path d="M6 10l3 3 5-5" stroke="#4ADE80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Check your inbox — reset link sent!
        </div>

        <button type="submit" class="btn-primary auth-submit" id="forgotBtn">Send Reset Link</button>
      </form>

      <p class="auth-switch" style="margin-top:20px;">Remember your password? <a href="/login.html">Log In</a></p>

    </div>
  </section>

  <script src="auth-client.js"></script>
  <script>
    async function handleForgot(event) {
      event.preventDefault();

      const email    = document.getElementById('forgot-email').value.trim();
      const feedback = document.getElementById('forgot-feedback');
      const success  = document.getElementById('forgot-success');
      const btn      = document.getElementById('forgotBtn');

      feedback.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Sending…';

      const { ok, data } = await MoshlyAuth.authFetch('/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email })
      });

      if (ok) {
        document.getElementById('forgotForm').style.display = 'none';
        success.style.display = 'flex';
      } else {
        feedback.textContent = data.error || 'Request failed. Please try again.';
        feedback.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }
  </script>
</body>
</html>
